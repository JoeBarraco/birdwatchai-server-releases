# BirdWatchAI Server — Docker Compose
#
# After cloning this repo, run:    docker compose up -d
# To update to the latest release: open the dashboard, click the ⬆ Update available button
#                                  in the Engine status card, review the release notes,
#                                  and click Apply update. The watchtower sidecar pulls
#                                  the new image and recreates the container automatically.
#
# Manual update (if you'd rather drive from the shell):
#                                  docker compose pull && docker compose up -d
#
# Detection history, config, and logs live in ./data on the host so they survive image updates
# and container recreations. Back up that folder if you care about your detection history.

services:
  birdwatch:
    image: ghcr.io/joebarraco/birdwatchai-server:latest
    container_name: birdwatch
    restart: unless-stopped
    ports:
      # Dashboard. Change the LEFT side (e.g. "9090:8080") to expose on a different host port.
      - "8080:8080"
    environment:
      # Wires the dashboard's "Apply update" button to the watchtower sidecar below. The token
      # must match WATCHTOWER_HTTP_API_TOKEN on the watchtower service. The default below works
      # as-is on a single-install machine; set BIRDWATCH_UPDATE_TOKEN in a .env file (or your
      # shell) if you'd rather use your own.
      BirdWatch__Update__WatchtowerUrl: http://watchtower:8080/v1/update
      BirdWatch__Update__WatchtowerToken: ${BIRDWATCH_UPDATE_TOKEN:-birdwatch-update-please}
    volumes:
      # All persistent state lives here: config.json, birdwatch.db (SQLite), snapshots/, logs/,
      # config.bak/, dataprotection-keys/. Survives every image update.
      - ./data:/data
      # Inherit the host's timezone so dashboard timestamps + scheduled reports match wall clock.
      # The container reads /etc/localtime to derive its local time — set the host's timezone
      # with `sudo timedatectl set-timezone America/New_York` (or pick it during Pi Imager's OS
      # customisation step), then recreate this container. We deliberately do NOT set a TZ
      # environment variable here: TZ would override /etc/localtime with whatever value was
      # hardcoded (typically UTC), which is the most common cause of "my dashboard shows the
      # wrong time" — see PISETUP.md troubleshooting.
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    #
    # Pi camera support: uncomment the single `privileged: true` line below if you're using a
    # wired Arducam / Raspberry Pi Camera Module over the CSI ribbon cable. On Pi OS Bookworm
    # the camera is owned by libcamera, which needs the host's device tree (under /proc/device-
    # tree), the dma_heap allocator, the full set of video/media nodes, and udev access to
    # enumerate the sensor. Docker shadows /proc with its own procfs after applying bind mounts,
    # so the "mount each piece individually" approach is unreliable on Bookworm — privileged
    # mode is the supported path. See PISETUP.md for ribbon orientation + enabling the camera
    # interface on the Pi itself.
    #
    # privileged: true
    #
    labels:
      # Only THIS container is managed by the watchtower sidecar — other containers on the
      # host are left untouched (we set --label-enable on watchtower below).
      com.centurylinklabs.watchtower.enable: "true"

  # Watchtower sidecar: dormant until the dashboard's "Apply update" button POSTs to its HTTP
  # API. On trigger it pulls the latest matching image from GHCR and recreates the birdwatch
  # container. Doesn't poll on its own — periodic polls are disabled so you stay in control
  # of when updates apply.
  watchtower:
    image: containrrr/watchtower
    container_name: birdwatch-watchtower
    restart: unless-stopped
    environment:
      WATCHTOWER_HTTP_API_UPDATE: "true"
      WATCHTOWER_HTTP_API_PERIODIC_POLLS: "false"
      WATCHTOWER_HTTP_API_TOKEN: ${BIRDWATCH_UPDATE_TOKEN:-birdwatch-update-please}
      # Only update containers with the matching label (so this never touches anything you
      # didn't opt in).
      WATCHTOWER_LABEL_ENABLE: "true"
      # Remove the old image after a successful update — keeps the disk tidy.
      WATCHTOWER_CLEANUP: "true"
      # Pin the Docker API version. Docker 26+ dropped legacy API versions and refuses
      # connections from clients that try to negotiate < 1.40. Watchtower's bundled client
      # defaults to a version below that on some Docker daemons, which puts the container
      # in a restart loop with "client version 1.25 is too old. Minimum supported API
      # version is 1.40" and birdwatch's apply POST then fails with a DNS error because
      # watchtower never stays up long enough to register. 1.44 is recent enough to satisfy
      # current Docker daemons and old enough to be widely supported.
      DOCKER_API_VERSION: "1.44"
    volumes:
      # Required for watchtower to manage other containers. This is the standard homelab-
      # accepted tradeoff: anything that can write to docker.sock effectively has root on
      # the host. Don't expose this stack to the public internet.
      - /var/run/docker.sock:/var/run/docker.sock
